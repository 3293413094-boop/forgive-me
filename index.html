<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>和好了吗</title>
  <style>
    :root {
      --bg: #f3d7df;
      --pink: #cf7c95;
      --pink-dark: #bf6b83;
      --blue: #7391bf;
      --blue-dark: #5f7eae;
      --text: #5b4750;
      --shadow: rgba(93, 64, 75, 0.12);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,0.16) 0 1px, transparent 1.6px) 0 0 / 26px 26px,
        linear-gradient(180deg, #f6dce3 0%, #f3d7df 100%);
      color: var(--text);
    }

    .page {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
    }

    .scene {
      position: relative;
      width: min(96vw, 1080px);
      min-height: min(88vh, 760px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 28px 18px 40px;
      transition: transform 180ms ease;
      min-width: 1000px;
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 46%, rgba(255,255,255,0.12) 0 30%, transparent 31%),
        radial-gradient(circle at 50% 52%, rgba(255,255,255,0.08) 0 24%, transparent 25%);
      opacity: 0.95;
    }

    .art {
      width: 240px;
      height: 240px;
      display: grid;
      place-items: center;
      margin-bottom: 8px;
      position: relative;
      filter: drop-shadow(0 12px 20px rgba(94, 63, 74, 0.08));
    }

    .art img {
      width: 190px;
      height: 190px;
      object-fit: contain;
      image-rendering: auto;
      user-select: none;
      pointer-events: none;
      filter: drop-shadow(0 2px 0 rgba(255,255,255,0.18));
    }

    .art::after {
      content: "呜呜呜~";
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #2e1f22;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
      pointer-events: none;
    }

    .title {
      margin: 0 0 18px;
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 800;
      letter-spacing: 0.5px;
      color: #5c4a52;
      text-shadow: 0 1px 0 rgba(255,255,255,0.35);
    }

    .buttons {
      position: relative;
      width: min(92vw, 920px);
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      transition: transform 180ms ease;
    }

    .btn {
      border: 0;
      border-radius: 16px;
      color: #fff;
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease, opacity 180ms ease, box-shadow 180ms ease;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      position: absolute;
    }

    .btn:active { transform: scale(0.96); }

    .agree {
      background: #d47f94;
      width: 92px;
      height: 42px;
      font-size: 16px;
      font-weight: 700;
      padding: 0 14px;
      transform-origin: center center;
      left: calc(50% - 70px);
      top: 50%;
      transform: translate(-50%, -50%) scale(1);
      border-radius: 4px;
      box-shadow: 0 10px 24px rgba(189, 108, 129, 0.22);
      transition: transform 180ms ease, background 180ms ease, opacity 180ms ease, box-shadow 180ms ease, left 180ms ease;
    }

    .deny {
      background: var(--blue);
      width: 92px;
      height: 42px;
      font-size: 15px;
      padding: 0 14px;
      transform-origin: center center;
      left: calc(50% + 70px);
      top: 50%;
      transform: translate(-50%, -50%) scale(1);
      border-radius: 4px;
      transition: transform 180ms ease, background 180ms ease, opacity 180ms ease, box-shadow 180ms ease, left 180ms ease;
    }

    .deny:hover { background: var(--blue-dark); }
    .agree:hover { background: var(--pink-dark); }

    .agree-screen,
    .final-screen {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 24px;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      filter: blur(0.2px);
      pointer-events: none;
    }

    .agree-screen.active,
    .final-screen.active { display: flex; }

    .agree-card {
      width: min(92vw, 680px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .agree-art {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      animation: float 2.8s ease-in-out infinite;
    }

    .agree-art img {
      width: min(52vw, 200px);
      height: auto;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }

    .agree-art .love {
      font-size: 52px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .agree-text {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.35;
      margin: 0;
    }

    .confetti {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      top: -12vh;
      font-size: 42px;
      opacity: 0.18;
      animation: fall linear infinite;
      filter: blur(0.3px);
    }

    @keyframes fall {
      from { transform: translateY(-10vh) rotate(0deg); }
      to { transform: translateY(120vh) rotate(20deg); }
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      opacity: 0.45;
    }

    @media (max-width: 520px) {
      html, body { overflow: hidden; }
      .page {
        overflow-x: auto;
        overflow-y: hidden;
        justify-content: flex-start;
      }
      .scene { min-height: 430px; min-width: 1000px; align-items: center; }
      .buttons { width: 100%; height: 180px; }
      .agree {
        width: 92px;
        height: 42px;
        font-size: 16px;
      }
      .deny {
        right: 4%;
        width: 92px;
        height: 42px;
        font-size: 15px;
      }
      .art { width: 160px; height: 160px; }
      .art img { width: 132px; height: 132px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="confetti" id="confetti"></div>

    <section class="scene" id="mainScene">
      <div class="art" aria-hidden="true"><img id="artImg" src="QQ图片20260415151604.gif" alt="小白熊动图" /></div>
      <h1 class="title">可以跟我和好吗？</h1>
      <div class="buttons">
        <button class="btn agree" id="agreeBtn">和好</button>
        <button class="btn deny" id="denyBtn">不要</button>
      </div>
      <div class="hint">点击左边会进入下一页，点击右边会一直变小</div>
    </section>

    <section class="agree-screen" id="agreeScreen" aria-hidden="true">
      <div class="agree-card">
        <div class="agree-art"><span class="love">💖</span><img src="QQ图片20260415162930.gif" alt="熊猫动图" /><span class="love">💖</span></div>
        <p class="agree-text">以后就是你的贴心<br />小跟班，指东绝不往西！</p>
        <p class="agree-text" style="font-size: clamp(18px, 3vw, 28px); font-weight: 700; margin-top: -4px;">让我们一起摇摆～</p>
      </div>
    </section>
  </div>

  <script>
    const denyBtn = document.getElementById('denyBtn');
    const agreeBtn = document.getElementById('agreeBtn');
    const mainScene = document.getElementById('mainScene');
    const agreeScreen = document.getElementById('agreeScreen');
    const confetti = document.getElementById('confetti');
    const artImg = document.getElementById('artImg');

    const denyGifs = [
      'QQ图片20260415155825.gif',
      'QQ图片20260415155619.gif',
      'QQ图片20260415155821.gif',
      'QQ图片20260415155831.gif',
      'QQ图片20260415163950.gif',
      'QQ图片20260415163954.gif',
      'QQ图片20260415163958.gif',
    ];
    let gifVersion = 0;

    let denyScale = 1;
    let agreeScale = 1;
    let clicks = 0;

    createBackgroundBubbles();

    denyBtn.addEventListener('click', () => {
      clicks += 1;
      agreeScale = Math.min(12, agreeScale * 1.38);

      const denyShift = 70 + (clicks * 100);
      const agreeShift = 70;
      const denyTopShift = Math.min(28, clicks * 4);
      const sceneLift = Math.min(90, (agreeScale - 1) * 18);

      mainScene.style.transform = `translateY(-${sceneLift}px)`;
      denyBtn.style.left = `calc(50% + ${denyShift}px)`;
      denyBtn.style.top = `calc(50% - ${denyTopShift}px)`;
      agreeBtn.style.left = `calc(50% - ${agreeShift}px)`;
      agreeBtn.style.top = '50%';

      denyBtn.style.transform = 'translate(-50%, -50%) scale(1)';
      denyBtn.style.opacity = '1';
      agreeBtn.style.transform = `translate(-50%, -50%) scale(${agreeScale})`;

      const nextGif = denyGifs[(clicks - 1) % denyGifs.length];
      gifVersion += 1;
      artImg.src = `${nextGif}?v=${gifVersion}`;

      denyBtn.textContent = clicks > 4 ? '再点我一下' : '不要';
    });

    agreeBtn.addEventListener('click', () => {
      mainScene.style.display = 'none';
      agreeScreen.classList.add('active');
      agreeScreen.setAttribute('aria-hidden', 'false');
      createHearts();
    });

    function createBackgroundBubbles() {
      const sizes = [120, 180, 90, 150, 70, 110];
      const positions = [
        [8, 16], [18, 74], [78, 18], [86, 80], [38, 10], [62, 86]
      ];
      sizes.forEach((size, index) => {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.style.width = `${size}px`;
        bubble.style.height = `${size}px`;
        bubble.style.left = `${positions[index][0]}%`;
        bubble.style.top = `${positions[index][1]}%`;
        bubble.style.opacity = String(0.08 + index * 0.01);
        bubble.style.boxShadow = 'inset 0 0 0 2px rgba(255,255,255,0.12)';
        document.querySelector('.page').appendChild(bubble);
      });
    }

    function createHearts() {
      if (confetti.children.length) return;
      const hearts = ['💗', '💖', '💘', '💝', '💞'];
      const total = 18;
      for (let i = 0; i < total; i++) {
        const span = document.createElement('span');
        span.className = 'heart';
        span.textContent = hearts[i % hearts.length];
        span.style.left = `${Math.random() * 100}%`;
        span.style.animationDuration = `${8 + Math.random() * 8}s`;
        span.style.animationDelay = `${Math.random() * 4}s`;
        span.style.fontSize = `${24 + Math.random() * 30}px`;
        span.style.opacity = `${0.08 + Math.random() * 0.16}`;
        confetti.appendChild(span);
      }
    }
  </script>
</body>
</html>
